<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#f4f5f7] h-[100vh] flex flex-col items-center">
    <div class="max-w-lg p-5 bg-white rounded-b-xl">
      <div
        class="flex justify-between items-center px-5 pb-3 border-b border-slate-300"
      >
        <div class="left flex items-center gap-2">
          <img src="./assets/Group.png" alt="" class="w-[50px]" />
          <div class="">
            <h1 class="font-bold text-lg">
              $<span id="balance-amount">45000</span>
            </h1>
            <p class="text-sm text-slate-500">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <button class="btn text-sm rounded-lg" id="logoutBtn">
            <i class="fa fa-sign-out" aria-hidden="true"></i>
            Log Out
          </button>
        </div>
      </div>
      <div class="py-3">
        <h1 class="font-bold text-xl">🔥 Welcome to Payooo!</h1>
        <p class="text-slate-500 mt-2">
          Enjoy easy and convenient financial services with us. <br />
          Cashout charge is low and
        </p>
      </div>
      <div class="quick-access grid grid-cols-3 gap-3">
        <button
          class="flex flex-col items-center justify-center gap-2 border border-slate-200 rounded-xl p-3 bg-white cursor-pointer hover:bg-blue-50 transition-colors"
          id="quick-access-add-money-btn"
        >
          <img src="./assets/wallet1.png" alt="" />
          <p class="text-sm">Add Money</p>
        </button>
        <button
          class="flex flex-col items-center justify-center gap-2 border border-slate-200 rounded-xl p-3 bg-white cursor-pointer hover:bg-blue-50 transition-colors"
          id="quick-access-cashout-btn"
        >
          <img src="./assets/send1.png" alt="" />
          <p class="text-sm">Cashout</p>
        </button>
        <button
          class="flex flex-col items-center justify-center gap-2 border border-slate-200 rounded-xl p-3 bg-white cursor-pointer hover:bg-blue-50 transition-colors"
          id="quick-access-transfer-money-btn"
        >
          <img src="./assets/money1.png" alt="" />
          <p class="text-sm">Transfer Money</p>
        </button>
        <button
          class="flex flex-col items-center justify-center gap-2 border border-slate-200 rounded-xl p-3 bg-white cursor-pointer hover:bg-blue-50 transition-colors"
          id="quick-access-get-bonus-btn"
        >
          <img src="./assets/bonus1.png" alt="" />
          <p class="text-sm">Get Bonus</p>
        </button>
        <button
          class="flex flex-col items-center justify-center gap-2 border border-slate-200 rounded-xl p-3 bg-white cursor-pointer hover:bg-blue-50 transition-colors"
          id="quick-access-pay-bill-btn"
        >
          <img src="./assets/purse1.png" alt="" />
          <p class="text-sm">Pay Bill</p>
        </button>
        <button
          class="flex flex-col items-center justify-center gap-2 border border-slate-200 rounded-xl p-3 bg-white cursor-pointer hover:bg-blue-50 transition-colors"
          id="quick-access-transactions-btn"
        >
          <img src="./assets/transaction1.png" alt="" />
          <p class="text-sm">Transactions</p>
        </button>
      </div>
    </div>
    <div class="all-form-sections max-w-lg mx-auto p-3">
      <!-- ADD MONEY FORM -->
      <div class="add-money-section hidden" id="add-money-section">
        <h1 class="font-bold mb-3">Add Money</h1>
        <form action="" class="mx-auto w-[400px] p-8 bg-white rounded-3xl">
          <div>
            <label for="number" class="font-semibold">Select A Bank</label>
            <br />
            <select
              id="bank-select"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3 w-full"
            >
              <option value="" selected disabled>Select A Bank</option>
              <option value="DBBL">DBBL</option>
              <option value="City Bank">City Bank</option>
              <option value="HSBC Bank">HSBC Bank</option>
              <option value="Islami Bank">Islami Bank</option>
            </select>
          </div>
          <div class="mt-5">
            <label for="" class="font-semibold">Bank Account Number</label>
            <br />
            <input
              type="text"
              id="bank-acc-number"
              placeholder="Enter 11-digit account number"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3 w-full"
            />
          </div>
          <div class="mt-5">
            <label for="" class="font-semibold">Amount to Add</label>
            <br />
            <input
              type="text"
              id="add-amount"
              placeholder="Enter amount to add"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3"
            />
          </div>
          <div class="mt-5">
            <label for="" class="font-semibold">Pin Number</label>
            <br />
            <input
              type="password"
              id="add-pin"
              placeholder="Enter 4 digit pin"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3"
            />
          </div>
          <button
            class="btn bg-[#0874f2] text-white w-full rounded-3xl mt-5 p-2"
            id="add-money"
          >
            Add Money
          </button>
        </form>
      </div>

      <!-- Cashout Section -->
      <div class="cashout-section" id="cashout-section">
        <h1 class="font-bold mb-3">Cash Out</h1>
        <form action="" class="mx-auto w-[400px] p-8 bg-white rounded-3xl">
          <div>
            <label for="" class="font-semibold">Agent Number</label>
            <br />
            <input
              type="text"
              id="cashout-acc-number"
              placeholder="Enter 11-digit agent number"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3 w-full"
            />
          </div>
          <div class="mt-5">
            <label for="" class="font-semibold">Amount to Add</label>
            <br />
            <input
              type="text"
              id="cashout-amount"
              placeholder="Enter amount to add"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3"
            />
          </div>
          <div class="mt-5">
            <label for="" class="font-semibold">Pin Number</label>
            <br />
            <input
              type="password"
              id="cashout-pin"
              placeholder="Enter 4 digit pin"
              class="input border-none bg-[#f4f5f7] rounded-3xl mt-3"
            />
          </div>
          <button
            class="btn bg-[#0874f2] text-white w-full rounded-3xl mt-5 p-2"
            id="cashout"
          >
            Withdraw Money
          </button>
        </form>
      </div>


      
    </div>

    <script src="./home.js"></script>
  </body>
</html>
