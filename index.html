<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f5f7] h-[100vh] flex justify-center items-center">
    
        <form action="" class="w-[350px]  mx-auto p-10 mt-[50px] bg-white rounded-3xl">
            <div>
                <label for="number" class="font-semibold">Mobile Number</label>
                <br>
                <input type="text" placeholder="Enter your number" class="input  bg-[#f4f5f7]  rounded-3xl mt-3 ">
            </div>
            <div class="mt-5">
                <label for="" class="font-semibold ">4 digit Pin</label>
                <br>
                <input type="password" placeholder="Enter 4 digit pin" class="input  bg-[#f4f5f7] rounded-3xl mt-3">
            </div>
            <button class="btn bg-[#0874f2] text-white w-full rounded-3xl mt-5">Login</button>
        </form>

</body>
</html>
