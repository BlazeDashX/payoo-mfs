<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f5f7] h-[100vh] flex flex-col justify-center items-center">
    
    <div class="h-[130px] w-[300px]  bg-[url('assets/bg.png')] bg-cover flex justify-center items-center ">
        <img src="./assets/Group.png" alt="">
    </div>

    <form action="" class="w-[350px]  mx-auto p-8  bg-white rounded-3xl">
            <div>
                <label for="number" class="font-semibold">Mobile Number</label>
                <br>
                <input type="text" id="mobile-number" placeholder="Enter your number" class="input border-none bg-[#f4f5f7] rounded-3xl mt-3 ">
            </div>
            <div class="mt-5">
                <label for="" class="font-semibold ">4 digit Pin</label>
                <br>
                <input type="password" id="pin" placeholder="Enter 4 digit pin" class="input border-none bg-[#f4f5f7] rounded-3xl mt-3">
            </div>
            <button class="btn bg-[#0874f2] text-white w-full rounded-3xl mt-5" id="loginBtn">Login</button>
    </form>





    <script src="./script.js"></script>
</body>
</html>
